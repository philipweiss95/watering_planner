name: Stable release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify tag and package version
        run: test "${GITHUB_REF_NAME#v}" = "$(cat VERSION)"
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Package stable update
        run: python scripts/package_release.py
      - name: Build release changelog
        run: python scripts/release_notes.py --output dist/release-notes.md
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE="dist/watering-planner-$(cat VERSION).zip"
          gh release create "$GITHUB_REF_NAME" "$ARCHIVE" "$ARCHIVE.sha256" --notes-file dist/release-notes.md --title "Watering Planner $GITHUB_REF_NAME"

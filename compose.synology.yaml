services:
  watering-planner:
    build: .
    image: watering-planner:latest
    container_name: watering-planner
    restart: unless-stopped
    user: "0:0"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATA_DIR: /app/data
      TZ: Europe/Berlin
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8080/api/state', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

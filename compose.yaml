services:
  watering-planner:
    build: .
    image: watering-planner:${APP_VERSION:-20260531-ui10}
    container_name: watering-planner
    restart: unless-stopped
    init: true
    user: "${PUID:-0}:${PGID:-0}"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATA_DIR: /app/data
      TZ: Europe/Berlin
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data

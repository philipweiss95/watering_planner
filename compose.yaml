services:
  watering-planner:
    build: .
    image: watering-planner:latest
    container_name: watering-planner
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATA_DIR: /app/data
      TZ: Europe/Berlin
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data

services:
  watering-planner:
    build: .
    image: watering-planner:1.1.0
    container_name: watering-planner
    restart: unless-stopped
    user: "0:0"
    env_file:
      - ./.env.synology
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATA_DIR: /app/data
      UPDATER_URL: http://updater:3188
      UPDATER_TOKEN_FILE: /app/data/.updater-token
      TZ: Europe/Berlin
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8080/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  updater:
    build:
      context: .
      dockerfile: updater/Dockerfile
    image: watering-planner-updater:1.1.0
    container_name: watering-planner-updater
    restart: unless-stopped
    user: "0:0"
    volumes:
      - ./:/project
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:3188/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

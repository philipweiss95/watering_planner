# Replace NAS-IP with the address of the Synology running the planner.
# Merge these top-level sections into an existing Home Assistant configuration.
# Load the HTTP endpoint used by webhook automation triggers.
webhook:

sensor:
  - platform: rest
    name: Bewaesserung Planner
    unique_id: bewaesserung_planner
    resource: "http://192.168.178.116:8080/api/homekit/check?auto=true&slot=morning"
    method: GET
    scan_interval: 900
    timeout: 10
    value_template: "{{ value_json.run_now }}"
    json_attributes:
      - run_now
      - should_run
      - reason
      - recommended_cycles_today
      - cycles_completed_today
      - remaining_cycles_today
      - pump
      - tank
      - refill
      - automation

rest_command:
  bewaesserung_mark_run:
    url: "http://192.168.178.116:8080/api/homekit/mark-run"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: '{"auto_weather": true, "slot": "morning"}'
  bewaesserung_mark_refill:
    url: "http://192.168.178.116:8080/api/refill/mark-run"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: '{}'

script:
  bewaesserung_pumpzyklus:
    alias: Bewaesserung - Pumpzyklus
    description: Setzt die Pumpe zurueck, schaltet sie fuer einen vollstaendigen Zyklus ein und verbucht den Lauf.
    mode: single
    sequence:
      - alias: Pumpe vor dem Start ausschalten
        action: switch.turn_off
        target:
          entity_id: switch.smart_plug_mini

      - alias: Neustart der Pumpe abwarten
        delay:
          seconds: 2

      - alias: Pumpe einschalten
        action: switch.turn_on
        target:
          entity_id: switch.smart_plug_mini

      - alias: Pumpzyklus abwarten
        delay:
          seconds: 120

      - alias: Pumpe ausschalten
        action: switch.turn_off
        target:
          entity_id: switch.smart_plug_mini

      - alias: Pumpzyklus im Planner verbuchen
        action: rest_command.bewaesserung_mark_run

      - alias: Planner-Aktualisierung abwarten
        delay:
          seconds: 2

      - alias: Planner-Sensor aktualisieren
        action: homeassistant.update_entity
        target:
          entity_id: sensor.bewaesserung_planner

  bewaesserung_nachfuellen:
    alias: Bewaesserung - Haupttank nachfuellen
    description: Schaltet die zweite Pumpe fuer die vom Planner berechnete Nachfuelldauer.
    mode: single
    sequence:
      - alias: Nachfuellpumpe vor dem Start ausschalten
        action: switch.turn_off
        target:
          entity_id: switch.pumpe

      - alias: Neustart der Nachfuellpumpe abwarten
        delay:
          seconds: 2

      - alias: Nachfuellpumpe einschalten
        action: switch.turn_on
        target:
          entity_id: switch.pumpe

      - alias: Berechnete Nachfuelldauer abwarten
        delay:
          seconds: "{{ (state_attr('sensor.bewaesserung_planner', 'refill') or {}).get('duration_seconds', 0) | int(0) }}"

      - alias: Nachfuellpumpe ausschalten
        action: switch.turn_off
        target:
          entity_id: switch.pumpe

      - alias: Nachfuelllauf im Planner verbuchen
        action: rest_command.bewaesserung_mark_refill

      - alias: Planner-Aktualisierung abwarten
        delay:
          seconds: 2

      - alias: Planner-Sensor aktualisieren
        action: homeassistant.update_entity
        target:
          entity_id: sensor.bewaesserung_planner

automation: !include automations.yaml

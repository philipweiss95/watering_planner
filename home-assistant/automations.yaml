# Replace switch.smart_plug_mini in configuration.yaml if Home Assistant
# assigned another entity ID.
- id: bewaesserung_tagesfenster
  alias: Bewaesserung - Tagesfenster
  description: Prüft regelmäßig, ob der Planner einen Pumpzyklus in einem Tagesfenster freigibt.
  mode: single

  trigger:
    - platform: time_pattern
      minutes: "/15"

  action:
    - condition: time
      after: "06:59:00"
      before: "19:21:00"

    - action: homeassistant.update_entity
      target:
        entity_id: sensor.bewaesserung_planner

    - delay:
        seconds: 2

    - condition: template
      value_template: >
        {{ states('sensor.bewaesserung_planner') in ['True', 'true', 'on'] }}

    - action: script.bewaesserung_pumpzyklus

# The random webhook ID must match HOME_ASSISTANT_WEBHOOK_URL in
# .env.synology on the NAS. Opening the URL in a browser sends GET and does not
# start the pump.
- id: bewaesserung_manueller_sofortlauf
  alias: Bewaesserung - Manueller Sofortlauf
  description: Startet einen vom Planner angeforderten Pumpzyklus.
  mode: single

  trigger:
    - platform: webhook
      webhook_id: 45dbcc8d4b31475289af2fd6ecb0eaf9
      allowed_methods:
        - POST
      local_only: false

  action:
    - action: script.bewaesserung_pumpzyklus

- id: bewaesserung_tank_warnung
  alias: Bewaesserung - Tankwarnung
  description: Meldet, wenn der Planner den Wassertank als niedrig oder nicht ausreichend einstuft.
  mode: single

  trigger:
    - platform: state
      entity_id: sensor.bewaesserung_planner

  condition:
    - condition: template
      value_template: >
        {% set tank = state_attr('sensor.bewaesserung_planner', 'tank') or {} %}
        {{ tank.get('low') or tank.get('empty_soon') }}

  action:
    - action: persistent_notification.create
      data:
        title: Bewaesserung: Tank pruefen
        message: >
          {% set tank = state_attr('sensor.bewaesserung_planner', 'tank') or {} %}
          {{ tank.get('warning') or 'Der Wassertank wird niedrig.' }}
          Aktueller Stand: {{ tank.get('percent', '?') }} %.

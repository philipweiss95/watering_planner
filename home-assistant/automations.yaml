# Replace switch.smart_plug_mini in configuration.yaml if Home Assistant
# assigned another entity ID.
- id: bewaesserung_tagesfenster
  alias: Bewaesserung - Tagesfenster
  description: Prüft regelmäßig, ob der Planner einen Pumpzyklus in einem Tagesfenster freigibt.
  mode: single

  trigger:
    - platform: time_pattern
      minutes: "/15"

  action:
    - condition: time
      after: "06:59:00"
      before: "19:21:00"

    - action: homeassistant.update_entity
      target:
        entity_id: sensor.bewaesserung_planner

    - delay:
        seconds: 2

    - condition: template
      value_template: >
        {{ states('sensor.bewaesserung_planner') in ['True', 'true', 'on'] }}

    - action: script.bewaesserung_pumpzyklus

# The random webhook ID must match HOME_ASSISTANT_WEBHOOK_URL in
# .env.synology on the NAS. Opening the URL in a browser sends GET and does not
# start the pump.
- id: bewaesserung_manueller_sofortlauf
  alias: Bewaesserung - Manueller Sofortlauf
  description: Startet einen vom Planner angeforderten Pumpzyklus.
  mode: single

  trigger:
    - platform: webhook
      webhook_id: REPLACE_WITH_RANDOM_WEBHOOK_ID
      allowed_methods:
        - POST
      local_only: false

  action:
    - action: script.bewaesserung_pumpzyklus

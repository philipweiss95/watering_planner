# Replace switch.smart_plug_mini and switch.smart_plug_mini_refill in
# configuration.yaml if Home Assistant assigned other entity IDs.
- id: bewaesserung_tagesfenster
  alias: Bewaesserung - Tagesfenster
  description: Prüft regelmäßig, ob der Planner einen Pumpzyklus in einem Tagesfenster freigibt.
  mode: single

  trigger:
    - platform: time_pattern
      minutes: "/15"

  action:
    - condition: time
      after: "06:59:00"
      before: "19:21:00"

    - action: homeassistant.update_entity
      target:
        entity_id: sensor.bewaesserung_planner

    - delay:
        seconds: 2

    - condition: template
      value_template: >
        {{ states('sensor.bewaesserung_planner') in ['True', 'true', 'on'] }}

    - action: script.bewaesserung_pumpzyklus

# The random webhook ID must match HOME_ASSISTANT_WEBHOOK_URL in
# .env.synology on the NAS. Opening the URL in a browser sends GET and does not
# start the pump.
- id: bewaesserung_manueller_sofortlauf
  alias: Bewaesserung - Manueller Sofortlauf
  description: Startet einen vom Planner angeforderten Pumpzyklus.
  mode: single

  trigger:
    - platform: webhook
      webhook_id: 45dbcc8d4b31475289af2fd6ecb0eaf9
      allowed_methods:
        - POST
      local_only: false

  action:
    - action: script.bewaesserung_pumpzyklus

- id: bewaesserung_manuelle_nachfuellung
  alias: Bewaesserung - Manuelle Nachfuellung
  description: Startet einen vom Planner angeforderten Nachfuelllauf.
  mode: single

  trigger:
    - platform: webhook
      webhook_id: 15dbcc8d4b31475289af2fd6ecb0eaf9
      allowed_methods:
        - POST
      local_only: false

  action:
    - action: homeassistant.update_entity
      target:
        entity_id: sensor.bewaesserung_planner

    - delay:
        seconds: 2

    - condition: template
      value_template: >
        {% set manual_refill = state_attr('sensor.bewaesserung_planner', 'manual_refill') or {} %}
        {{ manual_refill.get('duration_seconds', 0) | int(0) > 0 }}

    - action: script.bewaesserung_nachfuellen
      data:
        duration_seconds: >
          {{ (state_attr('sensor.bewaesserung_planner', 'manual_refill') or {}).get('duration_seconds', 0) | int(0) }}

- id: bewaesserung_haupttank_nachfuellen
  alias: Bewaesserung - Haupttank nachfuellen
  description: Fuellt um 03:00 oder 06:00 Uhr die Haelfte des fehlenden Haupttank-Inhalts aus dem 30-l-Vorratstank nach.
  mode: single

  trigger:
    - platform: time
      at: "03:00:00"
    - platform: time
      at: "06:00:00"

  action:
    - action: homeassistant.update_entity
      target:
        entity_id: sensor.bewaesserung_planner

    - delay:
        seconds: 2

    - condition: template
      value_template: >
        {% set refill = state_attr('sensor.bewaesserung_planner', 'refill') or {} %}
        {{ refill.get('enabled') and refill.get('run_now') and refill.get('duration_seconds', 0) | int(0) > 0 }}

    - action: script.bewaesserung_nachfuellen

- id: bewaesserung_tank_warnung
  alias: Bewaesserung - Tankwarnung
  description: Meldet, wenn der Planner den Wassertank als niedrig oder nicht ausreichend einstuft.
  mode: single

  trigger:
    - platform: state
      entity_id: sensor.bewaesserung_planner

  condition:
    - condition: template
      value_template: >
        {% set tank = state_attr('sensor.bewaesserung_planner', 'tank') or {} %}
        {% set refill = state_attr('sensor.bewaesserung_planner', 'refill') or {} %}
        {% set refill_tank = refill.get('refill_tank', {}) %}
        {{ tank.get('low') or tank.get('empty_soon') or refill_tank.get('empty') or refill.get('limited_by_refill_tank') }}

  action:
    - action: persistent_notification.create
      data:
        title: Bewaesserung - Tank pruefen
        message: >
          {% set tank = state_attr('sensor.bewaesserung_planner', 'tank') or {} %}
          {% set refill = state_attr('sensor.bewaesserung_planner', 'refill') or {} %}
          {% set refill_tank = refill.get('refill_tank', {}) %}
          {{ tank.get('warning') or refill.get('summary') or 'Ein Wassertank wird niedrig.' }}
          Haupttank: {{ tank.get('percent', '?') }} %, Vorratstank: {{ refill_tank.get('percent', '?') }} %.
